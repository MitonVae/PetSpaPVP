services:
  - type: web
    name: pet-spa-pvp
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
    # Render 免费版提供持久磁盘可选（付费功能），
    # 免费实例睡眠后数据会保留在磁盘，但重新部署会重置。
    # 如需持久化，开启下方 disk 配置（需 Render Starter 计划）：
    # disk:
    #   name: data-disk
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
