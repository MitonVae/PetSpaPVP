<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WS诊断</title>
    <style>
        body { background:#111; color:#eee; font-family:monospace; padding:20px; }
        button { padding:10px 18px; margin:5px; cursor:pointer; font-size:14px; border:none; border-radius:4px; }
        input  { background:#222; color:#eee; border:1px solid #555; padding:6px; width:180px; font-size:14px; }
        #log   { background:#000; padding:12px; height:300px; overflow-y:auto;
                 white-space:pre-wrap; font-size:13px; border:1px solid #333; margin-top:14px; }
    </style>
</head>
<body>
    <h2 style="color:#0f0">🧪 WebSocket 诊断工具</h2>

    <div style="margin:10px 0">
        用户名: <input id="u" value="testuser">
        &nbsp; 密码: <input id="p" type="password" value="pass123">
    </div>

    <button style="background:#2980b9;color:#fff" onclick="doConnect()">① 连接WS</button>
    <button style="background:#27ae60;color:#fff" onclick="doLogin()">② 发送LOGIN</button>
    <button style="background:#e67e22;color:#fff" onclick="doRegister()">③ 发送REGISTER</button>
    <button style="background:#555;color:#fff"    onclick="doClear()">清空</button>

    <div id="log">准备就绪，点击按钮开始测试…</div>

    <script>
    var _ws = null;

    function lg(msg) {
        var el = document.getElementById('log');
        el.innerHTML = el.innerHTML + '\n[' + new Date().toLocaleTimeString() + '] ' + msg;
        el.scrollTop = el.scrollHeight;
    }

    function doConnect() {
        lg('开始连接...');
        try {
            if (_ws) { try { _ws.close(); } catch(e){} }
            var url = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
            lg('连接地址: ' + url);
            _ws = new WebSocket(url);
            _ws.onopen    = function() { lg('✅ 连接成功！'); };
            _ws.onclose   = function(e) { lg('❌ 断开: code=' + e.code); };
            _ws.onerror   = function()  { lg('❌ 连接错误'); };
            _ws.onmessage = function(e) { lg('📨 收到: ' + e.data); };
        } catch(e) { lg('❌ 异常: ' + e.message); }
    }

    function doLogin() {
        lg('尝试登录...');
        if (!_ws || _ws.readyState !== 1) { lg('⚠️ 未连接，请先点①'); return; }
        var u = document.getElementById('u').value;
        var p = document.getElementById('p').value;
        var msg = JSON.stringify({type:'LOGIN', payload:{username:u, password:p}});
        _ws.send(msg);
        lg('📤 已发送: ' + msg);
    }

    function doRegister() {
        lg('尝试注册...');
        if (!_ws || _ws.readyState !== 1) { lg('⚠️ 未连接，请先点①'); return; }
        var u = document.getElementById('u').value;
        var p = document.getElementById('p').value;
        var msg = JSON.stringify({type:'REGISTER', payload:{username:u, password:p}});
        _ws.send(msg);
        lg('📤 已发送: ' + msg);
    }

    function doClear() {
        document.getElementById('log').innerHTML = '';
    }
    </script>
</body>
</html>
