<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 温泉宠物镇 - PetSpaPVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-screen">
        <div class="login-logo">🌸 温泉宠物镇<br><span>PetSpaPVP</span></div>
        <div class="login-sub">像素风社交宠物管理游戏</div>
        <div class="spa-scene login-spa">
            <div class="spa-steam"><span>💨</span><span>💨</span><span>💨</span></div>
            <div class="spa-rocks"></div>
        </div>
        <div class="login-box">
            <input type="text" id="username" placeholder="用户名 (2-16字符)" maxlength="16">
            <input type="password" id="password" placeholder="密码">
            <input type="password" id="confirmPassword" placeholder="确认密码" style="display: none;">
            <div class="login-options">
                <label class="remember-option">
                    <input type="checkbox" id="rememberMe">
                    记住账号
                </label>
            </div>
            <button class="btn" id="login" onclick="handleLogin()">登录</button>
            <button class="btn secondary" id="register" onclick="handleRegister()">注册</button>
            <!-- 紧急游客模式 - 直接进入游戏 -->
            <button class="btn guest-btn" onclick="enterGuestMode()" style="background: #4CAF50; margin-top: 8px;">🎮 游客模式 - 直接进入游戏</button>
            <div class="err-msg" id="loginErr"></div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-screen" style="display: none;">
        <!-- 顶栏 -->
        <div id="topbar">
            <div class="logo">🌸 温泉宠物镇</div>
            <div class="player-info">
                <span id="playerName"></span>
                <span>Lv.<span id="playerLevel">1</span></span>
                <span class="coins">🪙 <span id="playerCoins">0</span></span>
                <div class="exp-bar-wrap">
                    <div class="exp-bar-label">EXP</div>
                    <div class="exp-bar-track">
                        <div class="exp-bar-fill" id="expBar"></div>
                    </div>
                </div>
                <button class="btn small water-btn" id="dailySignin">📅 签到</button>
            </div>
        </div>

        <!-- 导航 Tab -->
        <div id="nav">
            <button class="nav-btn active" data-panel="main">🏠 主页</button>
            <button class="nav-btn" data-panel="pets">🐕 宠物</button>
            <button class="nav-btn" data-panel="social">👥 社交</button>
            <button class="nav-btn" data-panel="shop">🛒 商店</button>
            <button class="nav-btn" data-panel="tasks">📋 任务</button>
            <button class="nav-btn" data-panel="leaderboard">🏆 排行</button>
        </div>

        <!-- 三栏布局 -->
        <div id="three-col">
            <!-- 左栏：温泉区域（常驻） -->
            <div id="col-left">
                <div class="sidebar-section-title">
                    🌸 我的温泉 (Lv.<span id="spaLevel">1</span>)
                </div>
                <div class="spa-scene">
                    <div class="spa-steam"><span>💨</span><span>💨</span><span>💨</span></div>
                    <div class="spa-rocks"></div>
                    <div class="spa-level-badge">Lv.<span id="spaLevelBadge">1</span></div>
                </div>

                <div class="sidebar-section-title">
                    🥚 蛋池 (<span id="eggCount">0</span>/<span id="maxEggSlots">2</span>)
                    <div class="slot-info">蛋槽</div>
                </div>
                <div id="egg-pool"></div>

                <div class="sidebar-section-title guard-title">
                    🛡️ 守卫 (<span id="guardCount">0</span>/<span id="maxGuardSlots">2</span>)
                    <div class="slot-info">守卫槽</div>
                </div>
                <div class="guard-slots" id="guard-slots"></div>
            </div>

            <!-- 中栏：主内容区域 -->
            <div id="col-main">
                <!-- 面板内容 -->
                <div id="main" class="panel active">
                    <div class="section-title">🌸 温泉管理中心</div>
                    <!-- 主要内容由 game.js 填充 -->
                </div>
                <div id="pets" class="panel">
                    <div class="section-title">🐕 我的宠物</div>
                    <div id="pet-list"></div>
                </div>
                <div id="social" class="panel">
                    <div class="section-title">👥 社交网络</div>
                    <!-- 社交内容由 game.js 填充 -->
                </div>
                <div id="shop" class="panel">
                    <div class="section-title">🛒 神秘商店</div>
                    <div class="shop-grid" id="shop-grid"></div>
                </div>
                <div id="tasks" class="panel">
                    <div class="section-title">📋 每日任务</div>
                    <div class="task-list" id="task-list"></div>
                </div>
                <div id="leaderboard" class="panel">
                    <div class="section-title">🏆 财富排行榜</div>
                    <table id="leaderboard-list"></table>
                </div>
            </div>

            <!-- 右栏：快捷操作和社交动态 -->
            <div id="col-right">
                <div class="right-section-title">⚡ 快捷操作</div>
                <div class="quick-actions">
                    <button class="water-btn btn small" id="refreshState">🔄 刷新</button>
                    <button class="danger-btn btn small" id="collectAll">📦 一键收取</button>
                </div>

                <div class="right-section-title">🔥 热门玩家</div>
                <div id="hot-players-list"></div>

                <div class="right-section-title">📱 消息通知</div>
                <div id="notification-feed">
                    <div class="notification-item">🎉 欢迎来到温泉宠物镇！</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div id="result-modal">
        <div class="modal-box">
            <div class="modal-title" id="resultTitle">结果</div>
            <div class="modal-desc" id="resultDesc">描述</div>
            <button class="modal-close" id="closeModal">确定</button>
        </div>
    </div>

    <!-- 宠物操作弹窗 -->
    <div id="pet-action-modal">
        <div class="modal-box">
            <div class="modal-title">宠物操作</div>
            <div class="modal-desc" id="petActionContent">内容</div>
            <button class="modal-close" id="closePetModal">关闭</button>
        </div>
    </div>

    <!-- 守卫选择弹窗 -->
    <div id="guard-select-modal">
        <div class="modal-box">
            <div class="modal-title">选择守卫宠物</div>
            <div class="pet-picker" id="petPicker">选择宠物</div>
            <button class="modal-close" id="closeGuardModal">取消</button>
        </div>
    </div>

    <!-- 访问面板 -->
    <div id="visit-view" style="display: none;"></div>

    <!-- 偷袭策略面板 -->
    <div id="strategy-panel">
        <div class="strategy-title">选择偷袭策略</div>
        <div class="strategy-opts" id="strategyOpts"></div>
        <div id="attacker-pet-select"></div>
        <button class="btn" id="executeSteal">执行偷袭</button>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <!-- 全服通知 -->
    <div id="global-notice"></div>

    <script src="render.js"></script>
    <script src="game.js"></script>
</body>
</html>
