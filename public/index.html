<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 温泉宠物镇 - PetSpaPVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-screen">
        <div class="login-logo">🌸 温泉宠物镇<br><span>PetSpaPVP</span></div>
        <div class="login-sub">像素风社交宠物管理游戏</div>
        <div class="spa-scene login-spa">
            <div class="spa-steam"><span>💨</span><span>💨</span><span>💨</span></div>
            <div class="spa-rocks"></div>
        </div>
        <div class="login-box">
            <input type="text" id="username" placeholder="用户名 (2-16字符)" maxlength="16">
            <input type="password" id="password" placeholder="密码">
            <input type="password" id="confirmPassword" placeholder="确认密码" style="display: none;">
            <div class="login-options">
                <label class="remember-option">
                    <input type="checkbox" id="rememberMe">
                    记住账号
                </label>
            </div>
            <button class="btn" id="login" onclick="handleLogin()">登录</button>
            <button class="btn secondary" id="register" onclick="handleRegister()">注册</button>
            <!-- 紧急游客模式 - 直接进入游戏 -->
            <button class="btn guest-btn" onclick="enterGuestMode()" style="background: #4CAF50; margin-top: 8px;">🎮 游客模式 - 直接进入游戏</button>
            <div class="err-msg" id="loginErr"></div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-screen" style="display: none;">
        <!-- 顶栏 -->
        <div id="topbar">
            <div class="logo">🌸 温泉宠物镇</div>
            <div class="player-info">
                <span id="playerName"></span>
                <span>Lv.<span id="playerLevel">1</span></span>
                <span class="coins">🪙 <span id="playerCoins">0</span></span>
                <div class="exp-bar-wrap">
                    <div class="exp-bar-label">EXP</div>
                    <div class="exp-bar-track">
                        <div class="exp-bar-fill" id="expBar"></div>
                    </div>
                </div>
                <button class="btn small water-btn" id="dailySignin">📅 签到</button>
            </div>
        </div>

        <!-- 导航 Tab -->
        <div id="nav">
            <button class="nav-btn active" data-panel="main">🏠 主页</button>
            <button class="nav-btn" data-panel="pets">🐕 宠物</button>
            <button class="nav-btn" data-panel="social">👥 社交</button>
            <button class="nav-btn" data-panel="shop">🛒 商店</button>
            <button class="nav-btn" data-panel="tasks">📋 任务</button>
            <button class="nav-btn" data-panel="leaderboard">🏆 排行</button>
        </div>

        <!-- 三栏布局 -->
        <div id="three-col">
            <!-- 左栏：温泉区域（常驻） -->
            <div id="col-left">
                <div class="sidebar-section-title">
                    🌸 我的温泉 (Lv.<span id="spaLevel">1</span>)
                </div>
                <div class="spa-scene">
                    <div class="spa-steam"><span>💨</span><span>💨</span><span>💨</span></div>
                    <div class="spa-rocks"></div>
                    <div class="spa-level-badge">Lv.<span id="spaLevelBadge">1</span></div>
                </div>

                <div class="sidebar-section-title">
                    🥚 蛋池 (<span id="eggCount">0</span>/<span id="maxEggSlots">2</span>)
                    <div class="slot-info">蛋槽</div>
                </div>
                <div id="egg-pool"></div>

                <div class="sidebar-section-title guard-title">
                    🛡️ 守卫 (<span id="guardCount">0</span>/<span id="maxGuardSlots">2</span>)
                    <div class="slot-info">守卫槽</div>
                </div>
                <div class="guard-slots" id="guard-slots"></div>
            </div>

            <!-- 中栏：主内容区域 -->
            <div id="col-main">
                <!-- 面板内容 -->
                <div id="main" class="panel active">
                    <div class="section-title">🌸 温泉管理中心</div>
                    <!-- 主要内容由 game.js 填充 -->
                </div>
                <div id="pets" class="panel">
                    <div class="section-title">🐕 我的宠物</div>
                    <div id="pet-list"></div>
                </div>
                <div id="social" class="panel">
                    <div class="section-title">👥 社交网络</div>
                    <!-- 社交内容由 game.js 填充 -->
                </div>
                <div id="shop" class="panel">
                    <div class="section-title">🛒 神秘商店</div>
                    <div class="shop-grid" id="shop-grid"></div>
                </div>
                <div id="tasks" class="panel">
                    <div class="section-title">📋 每日任务</div>
                    <div class="task-list" id="task-list"></div>
                </div>
                <div id="leaderboard" class="panel">
                    <div class="section-title">🏆 财富排行榜</div>
                    <table id="leaderboard-list"></table>
                </div>
            </div>

            <!-- 右栏：快捷操作和社交动态 -->
            <div id="col-right">
                <div class="right-section-title">⚡ 快捷操作</div>
                <div class="quick-actions">
                    <button class="water-btn btn small" id="refreshState">🔄 刷新</button>
                    <button class="danger-btn btn small" id="collectAll">📦 一键收取</button>
                </div>

                <div class="right-section-title">🔥 热门玩家</div>
                <div id="hot-players-list"></div>

                <div class="right-section-title">📱 消息通知</div>
                <div id="notification-feed">
                    <div class="notification-item">🎉 欢迎来到温泉宠物镇！</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div id="result-modal">
        <div class="modal-box">
            <div class="modal-title" id="resultTitle">结果</div>
            <div class="modal-desc" id="resultDesc">描述</div>
            <button class="modal-close" id="closeModal">确定</button>
        </div>
    </div>

    <!-- 宠物操作弹窗 -->
    <div id="pet-action-modal">
        <div class="modal-box">
            <div class="modal-title">宠物操作</div>
            <div class="modal-desc" id="petActionContent">内容</div>
            <button class="modal-close" id="closePetModal">关闭</button>
        </div>
    </div>

    <!-- 守卫选择弹窗 -->
    <div id="guard-select-modal">
        <div class="modal-box">
            <div class="modal-title">选择守卫宠物</div>
            <div class="pet-picker" id="petPicker">选择宠物</div>
            <button class="modal-close" id="closeGuardModal">取消</button>
        </div>
    </div>

    <!-- 访问面板 -->
    <div id="visit-view" style="display: none;"></div>

    <!-- 偷袭策略面板 -->
    <div id="strategy-panel">
        <div class="strategy-title">选择偷袭策略</div>
        <div class="strategy-opts" id="strategyOpts"></div>
        <div id="attacker-pet-select"></div>
        <button class="btn" id="executeSteal">执行偷袭</button>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <!-- 全服通知 -->
    <div id="global-notice"></div>

    <script src="render.js"></script>
    <script src="game.js"></script>

    <!-- ====================================================
         登录 / 注册 独立脚本（优先级最高，覆盖 game.js 同名函数）
         修复：
           1. send() 静默丢弃（WS 未就绪时将请求排队）
           2. 服务器注册成功发 LOGGED_IN 而非 REGISTER_OK
           3. 错误消息正确显示在 loginErr 区域
    ==================================================== -->
    <script>
    (function () {
      'use strict';

      // ── WS 连接状态指示 ──────────────────────────────────
      const WS_STATUS = document.createElement('div');
      WS_STATUS.id = 'ws-status-bar';
      WS_STATUS.style.cssText =
        'position:fixed;top:0;left:0;right:0;z-index:9999;' +
        'padding:4px 12px;font-size:12px;text-align:center;transition:all .3s;display:none;';
      document.body.appendChild(WS_STATUS);

      function setStatus(msg, color) {
        WS_STATUS.textContent = msg;
        WS_STATUS.style.background = color;
        WS_STATUS.style.color = '#fff';
        WS_STATUS.style.display = 'block';
      }

      // ── 安全的 WS send，自动等待就绪 ──────────────────────
      let _pendingSends = [];

      function safeSend(type, payload) {
        const data = JSON.stringify({ type, payload: payload || {} });
        if (typeof ws !== 'undefined' && ws && ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        } else {
          // WS 未就绪：排队，最多等 8 秒
          _pendingSends.push({ data, ts: Date.now() });
          setStatus('⏳ 正在连接服务器…', '#e67e22');
          waitForWS();
        }
      }

      let _waitTimer = null;
      function waitForWS() {
        if (_waitTimer) return;
        _waitTimer = setInterval(() => {
          const now = Date.now();
          _pendingSends = _pendingSends.filter(p => now - p.ts < 8000);
          if (!_pendingSends.length) { clearInterval(_waitTimer); _waitTimer = null; return; }

          if (typeof ws !== 'undefined' && ws && ws.readyState === WebSocket.OPEN) {
            clearInterval(_waitTimer); _waitTimer = null;
            _pendingSends.forEach(p => ws.send(p.data));
            _pendingSends = [];
            setStatus('✅ 已连接', '#27ae60');
            setTimeout(() => { WS_STATUS.style.display = 'none'; }, 1500);
          }
        }, 200);
      }

      // ── 显示登录错误 ──────────────────────────────────────
      function showLoginErr(msg) {
        const el = document.getElementById('loginErr');
        if (el) { el.textContent = msg; el.style.color = '#e74c3c'; }
      }
      function clearLoginErr() {
        const el = document.getElementById('loginErr');
        if (el) el.textContent = '';
      }

      // ── 注册模式切换 ─────────────────────────────────────
      let _isRegMode = false;

      function switchToRegister() {
        _isRegMode = true;
        const cp = document.getElementById('confirmPassword');
        if (cp) cp.style.display = '';
        const regBtn = document.getElementById('register');
        if (regBtn) { regBtn.textContent = '✅ 确认注册'; regBtn.style.background = '#27ae60'; }
        const loginBtn = document.getElementById('login');
        if (loginBtn) loginBtn.textContent = '← 返回登录';
        clearLoginErr();
        document.getElementById('username') && document.getElementById('username').focus();
      }

      function switchToLogin() {
        _isRegMode = false;
        const cp = document.getElementById('confirmPassword');
        if (cp) { cp.style.display = 'none'; cp.value = ''; }
        const regBtn = document.getElementById('register');
        if (regBtn) { regBtn.textContent = '注册'; regBtn.style.background = ''; }
        const loginBtn = document.getElementById('login');
        if (loginBtn) loginBtn.textContent = '登录';
        clearLoginErr();
      }

      // ── 覆盖全局登录函数 ─────────────────────────────────
      window.handleLogin = function () {
        if (_isRegMode) { switchToLogin(); return; }

        const u = (document.getElementById('username').value || '').trim();
        const p = (document.getElementById('password').value || '').trim();

        if (!u || !p) { showLoginErr('请填写用户名和密码'); return; }

        clearLoginErr();
        const loginBtn = document.getElementById('login');
        if (loginBtn) { loginBtn.textContent = '登录中…'; loginBtn.disabled = true; }

        safeSend('LOGIN', { username: u, password: p });

        // 5 秒超时提示
        setTimeout(() => {
          if (loginBtn && loginBtn.disabled) {
            loginBtn.textContent = '登录';
            loginBtn.disabled = false;
            showLoginErr('服务器响应超时，请检查网络后重试');
          }
        }, 5000);
      };

      window.handleRegister = function () {
        if (!_isRegMode) { switchToRegister(); return; }

        const u  = (document.getElementById('username').value || '').trim();
        const p  = (document.getElementById('password').value || '').trim();
        const cp = (document.getElementById('confirmPassword').value || '').trim();

        if (!u || !p || !cp) { showLoginErr('请填写所有字段'); return; }
        if (u.length < 2)    { showLoginErr('用户名至少2位'); return; }
        if (p.length < 3)    { showLoginErr('密码至少3位'); return; }
        if (p !== cp)        { showLoginErr('两次密码不一致'); return; }

        clearLoginErr();
        const regBtn = document.getElementById('register');
        if (regBtn) { regBtn.textContent = '注册中…'; regBtn.disabled = true; }

        safeSend('REGISTER', { username: u, password: p });

        setTimeout(() => {
          if (regBtn && regBtn.disabled) {
            regBtn.textContent = '✅ 确认注册';
            regBtn.disabled = false;
            showLoginErr('服务器响应超时，请检查网络后重试');
          }
        }, 5000);
      };

      // ── 拦截 handleServerMsg 以处理登录/注册响应 ─────────
      //    game.js 里的 handleServerMsg 不变，这里在 WS onmessage 前拦截
      const _origConnectWS = window.connectWS;   // game.js 启动时设置的

      // 在 WS 层面加一个拦截器（不破坏 game.js 现有逻辑）
      const _origWsDescriptor = Object.getOwnPropertyDescriptor(window, 'ws');

      // 直接 patch onmessage（game.js 的 connectWS 已经跑了）
      // 用一个 MutationObserver 轮询 ws 就绪
      let _patchDone = false;
      function patchWS() {
        if (_patchDone) return;
        if (typeof ws === 'undefined' || !ws) return;
        _patchDone = true;

        const origOnMessage = ws.onmessage;
        ws.onmessage = function (ev) {
          try {
            const { type, payload } = JSON.parse(ev.data);
            // 登录/注册界面可见时，优先处理这些消息
            const loginVisible = document.getElementById('login-screen') &&
              document.getElementById('login-screen').style.display !== 'none';

            if (loginVisible) {
              if (type === 'LOGGED_IN') {
                // 恢复按钮
                const loginBtn = document.getElementById('login');
                if (loginBtn) { loginBtn.textContent = '登录'; loginBtn.disabled = false; }
                const regBtn = document.getElementById('register');
                if (regBtn) { regBtn.textContent = '注册'; regBtn.disabled = false; }
                setStatus('✅ 登录成功！', '#27ae60');
              }
              if (type === 'ERROR' || type === 'AUTH_ERROR') {
                const loginBtn = document.getElementById('login');
                if (loginBtn) { loginBtn.textContent = '登录'; loginBtn.disabled = false; }
                const regBtn = document.getElementById('register');
                if (regBtn) {
                  regBtn.textContent = _isRegMode ? '✅ 确认注册' : '注册';
                  regBtn.disabled = false;
                }
                showLoginErr(payload.msg || payload.code || '操作失败');
                WS_STATUS.style.display = 'none';
              }
            }
          } catch (e) { /* ignore */ }

          // 继续调用 game.js 的原始处理器
          if (origOnMessage) origOnMessage.call(this, ev);
        };

        // WS 连接状态
        const origOnOpen = ws.onopen;
        ws.onopen = function (e) {
          setStatus('✅ 服务器已连接', '#27ae60');
          setTimeout(() => { WS_STATUS.style.display = 'none'; }, 2000);
          if (origOnOpen) origOnOpen.call(this, e);
        };
        const origOnClose = ws.onclose;
        ws.onclose = function (e) {
          setStatus('🔴 服务器断开，重连中…', '#c0392b');
          _patchDone = false;   // 重连后需要重新 patch
          if (origOnClose) origOnClose.call(this, e);
        };
      }

      // 每 300ms 检查 ws 是否已经被 connectWS() 初始化
      const _patchInterval = setInterval(() => {
        if (typeof ws !== 'undefined' && ws) { patchWS(); }
        if (_patchDone) clearInterval(_patchInterval);
      }, 300);

      // ── 回车键快捷提交 ─────────────────────────────────────
      document.addEventListener('DOMContentLoaded', function () {
        ['username', 'password', 'confirmPassword'].forEach(id => {
          const el = document.getElementById(id);
          if (el) {
            el.addEventListener('keydown', function (e) {
              if (e.key === 'Enter') {
                e.preventDefault();
                if (_isRegMode) window.handleRegister();
                else window.handleLogin();
              }
            });
          }
        });
      });

    })();
    </script>
</body>
</html>
